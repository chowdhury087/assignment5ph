<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>GitHub Issues Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="login-wrapper">

    <div class="login-card">

      <img src="assets/github-logo.png" class="logo">

      <h1>GitHub Issues Tracker</h1>

      <p class="subtitle">Sign in to manage your issues</p>


      <label>Username</label>

      <input type="text" placeholder="Enter Username" id="username">

      <p class="default">Default: admin</p>


      <label>Password</label>

      <input type="password" placeholder="Enter Password" id="password">

      <p class="default">Default: admin123</p>


      <button class="login-btn" onclick="login()">Sign In</button>


      <div class="divider">
        <span></span>
        <p>OR</p>
        <span></span>
      </div>


      <p class="demo-title">Demo Credentials:</p>

      <div class="demo-box">

        <p><b>Username:</b> admin</p>

        <p><b>Password:</b> admin123</p>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
